server:
  port: 8081

spring:
  application:
    name: PlazmaApi

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
#mysecretpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: plazma
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
    url: jdbc:postgresql://localhost:5432/postgres
    user: postgres
    password: 1488

  token:
    signing:
      key: "plazmaapi_local_jwt_secret_min_32_chars_2026"

# Модель энерговклада ионного воздействия (формулы 1–14)
energy-deposition:
  anode-drop-fraction: 0.02
  cathode-fall-fraction: 0.85
  anode-sheath-fraction: 0.05
  cathode-sheath-fraction: 0.12
  energy-gain-exponent: 1.0
  reference-path-length-m: 0.1
  default-gap-length-m: 0.1
  default-path-length-m: 0.1
  integration:
    min-steps: 50
    max-steps: 5000
  fluence:
    angle-exponent: 7
    geometry-exponent: 2.0
    pressure-scale-pa: 10.0
    reference-ion-energy-ev: 100.0
    reference-ion-flux: 1.0e18
  layer:
    dose-to-thickness: 5.0e-12
    implantation-efficiency: 0.35
    reference-penetration-gain: 100.0
    angular-beta: 0.15
    temperature-gamma: 2.0e-4
    plasma-pressure-eta: 1.0e-5
    plasma-electron-temp-eta: 0.15
    plasma-current-eta: 1.0e-3
    plasma-voltage-eta: 1.0e-4
    bracket-min: 0.05
    bracket-max: 50.0
  plasma:
    linear-pressure: 1.0e-5
    linear-electron-temp: 0.15
    linear-current: 1.0e-3
    linear-voltage: 1.0e-4
    pair-pressure-temp: 2.0e-6
    pair-current-voltage: 5.0e-7
    min-factor: 0.1
    max-factor: 10.0
  skin:
    enabled: true
    angular-frequency: 2.0e6
    ac-field-fraction: 0.12
    surface-heat-capacity: 4.0e6
    default-conductivity: 1.0e7
    relative-permeability: 1.0
  lorentz:
    enabled: true
    axial-current-factor: 1.0
    return-current-axial-fraction: 0.3
    current-density-factor: 0.5
    pressure-damping-pa: 50.0

slr:
  k: 5.0e-3
  fluence0: 1.0e20